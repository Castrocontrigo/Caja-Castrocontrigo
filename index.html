<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0c0e">
<title>Caja · Castrocontrigo Project</title>
<style>
  :root{
    --bg:#0c0c0e;
    --panel:#171518;
    --panel-2:#1f1c20;
    --line:#2c2830;
    --accent:#c81e4f;
    --accent-soft:rgba(200,30,79,0.16);
    --gold:#d4af6a;
    --yellow:#f6c945;
    --text:#f5f2ee;
    --muted:#9c969f;
    --good:#4f9d6e;
    --good-soft:rgba(79,157,110,0.16);
    --bad:#d8505c;
    --bad-soft:rgba(216,80,92,0.16);
    --font-display: 'Arial Black', Arial, 'Helvetica Neue', sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'SF Mono', 'Roboto Mono', 'Courier New', monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer;}
  button:focus-visible, input:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  input{font-family:inherit;}

  .bomb{
    position:relative;
    display:inline-block;
    width:13px;
    height:15px;
    flex-shrink:0;
  }
  .bomb::before{
    content:'';
    position:absolute;
    left:0;bottom:0;
    width:100%;height:82%;
    border-radius:50%;
    background:var(--text);
  }
  .bomb-fuse{
    position:absolute;
    width:16%;height:40%;
    top:-2%;left:58%;
    background:var(--gold);
    border-radius:2px;
    transform-origin:bottom center;
    transform:rotate(28deg);
  }
  .bomb-spark{
    position:absolute;
    width:40%;height:40%;
    top:-16%;left:64%;
    background:var(--yellow);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  }
  .bomb.big{width:120px;height:138px;}

  /* ---------- layout shell ---------- */
  .app{
    max-width:760px;
    margin:0 auto;
    padding-bottom:96px; /* room for sticky order bar */
    min-height:100vh;
    position:relative;
  }

  /* ---------- header ---------- */
  .topbar{
    padding:18px 16px 14px;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:
      radial-gradient(2px 2px at 12% 22%, #fff 0%, transparent 60%),
      radial-gradient(2px 2px at 78% 18%, #fff 0%, transparent 60%),
      radial-gradient(1.5px 1.5px at 92% 60%, var(--gold) 0%, transparent 60%),
      radial-gradient(1.5px 1.5px at 34% 70%, #fff 0%, transparent 60%),
      radial-gradient(2px 2px at 58% 45%, var(--gold) 0%, transparent 60%),
      radial-gradient(1.5px 1.5px at 8% 80%, #fff 0%, transparent 60%),
      var(--bg);
    z-index:5;
  }
  .topbar-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
  }
  .eyebrow{
    font-family:var(--font-body);
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin:0 0 4px;
  }
  .title{
    font-family:var(--font-display);
    font-weight:900;
    font-style:italic;
    font-size:30px;
    margin:0;
    display:flex;
    align-items:center;
    gap:6px;
    letter-spacing:-0.01em;
  }
  .title .bomb{width:20px;height:23px;transform:rotate(-6deg);}

  /* ---------- catalog ---------- */
  .catalog{padding:18px 16px 8px;}
  .cat-section{margin-bottom:26px;}
  .cat-header{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:12px;
  }
  .cat-header h2{
    font-family:var(--font-display);
    font-weight:900;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:.06em;
    margin:0;
  }
  .cat-header .rule{
    flex:1;
    height:1px;
    background:var(--line);
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }
  @media(min-width:560px){ .grid{grid-template-columns:repeat(3,1fr);} }

  .product{
    position:relative;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 12px;
    text-align:left;
    transition:transform .08s ease, border-color .15s ease;
    min-height:78px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    gap:6px;
  }
  .product:active{transform:scale(.96);}
  .product.has-qty{border-color:var(--accent);}
  .product-name{
    font-size:13px;
    font-weight:600;
    line-height:1.25;
  }
  .product-price{
    font-family:var(--font-mono);
    font-size:15px;
    font-weight:700;
    color:var(--gold);
  }
  .product-extra-tag{
    font-size:10px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.05em;
  }
  .product-qty{
    position:absolute;
    top:-8px;
    right:-8px;
    min-width:22px;
    height:22px;
    padding:0 5px;
    border-radius:11px;
    background:var(--accent);
    color:#fff;
    font-family:var(--font-mono);
    font-size:12px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 0 3px var(--bg);
  }
  .product-qty.bump{animation:bump .22s ease;}
  @keyframes bump{ 0%{transform:scale(1);} 45%{transform:scale(1.35);} 100%{transform:scale(1);} }

  /* ---------- sticky order bar ---------- */
  .orderbar{
    position:fixed;
    left:0;right:0;bottom:0;
    max-width:760px;
    margin:0 auto;
    background:var(--panel-2);
    border-top:1px solid var(--line);
    padding:12px 16px;
    display:flex;
    align-items:center;
    gap:10px;
    z-index:10;
  }
  .orderbar-info{flex:1;min-width:0;}
  .orderbar-count{
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.05em;
  }
  .orderbar-total{
    font-family:var(--font-mono);
    font-size:22px;
    font-weight:700;
  }
  .btn{
    border-radius:9px;
    padding:13px 16px;
    font-weight:700;
    font-size:14px;
    white-space:nowrap;
  }
  .btn-ghost{
    background:transparent;
    border:1px solid var(--line);
    color:var(--muted);
  }
  .btn-ghost:active{background:var(--panel);}
  .btn-accent{
    background:var(--accent);
    color:#fff;
  }
  .btn-accent:disabled{
    background:var(--line);
    color:var(--muted);
    cursor:not-allowed;
  }
  .btn-good{background:var(--good);color:#fff;}
  .btn-good:disabled{background:var(--line);color:var(--muted);cursor:not-allowed;}

  /* ---------- checkout overlay ---------- */
  .overlay{
    position:fixed;
    inset:0;
    background:var(--bg);
    z-index:50;
    display:flex;
    flex-direction:column;
    transform:translateY(100%);
    transition:transform .22s ease;
  }
  .overlay.open{transform:translateY(0);}
  @media (prefers-reduced-motion: reduce){ .overlay{transition:none;} }

  .overlay-header{
    display:flex;
    align-items:center;
    gap:12px;
    padding:16px 16px 12px;
    border-bottom:1px solid var(--line);
  }
  .overlay-back{
    font-size:20px;
    padding:6px 10px;
    color:var(--text);
  }
  .overlay-header h2{
    font-family:var(--font-display);
    font-style:italic;
    font-weight:900;
    font-size:18px;
    margin:0;
  }
  .overlay-body{
    flex:1;
    overflow-y:auto;
    padding:16px;
    max-width:760px;
    width:100%;
    margin:0 auto;
  }

  .cart-list{margin-bottom:18px;}
  .cart-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 0;
    border-bottom:1px solid var(--line);
  }
  .cart-row-name{flex:1;font-size:13.5px;}
  .cart-row-controls{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .qty-btn{
    width:28px;height:28px;
    border-radius:7px;
    background:var(--panel);
    border:1px solid var(--line);
    font-weight:700;
    font-size:15px;
    display:flex;align-items:center;justify-content:center;
  }
  .qty-val{
    font-family:var(--font-mono);
    min-width:18px;
    text-align:center;
    font-size:13px;
  }
  .cart-row-sub{
    font-family:var(--font-mono);
    font-size:13.5px;
    font-weight:700;
    min-width:62px;
    text-align:right;
    color:var(--gold);
  }
  .empty-note{
    color:var(--muted);
    font-size:13px;
    padding:18px 0;
    text-align:center;
  }

  .total-block{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:14px 0 22px;
    border-bottom:1px solid var(--line);
    margin-bottom:20px;
  }
  .total-label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.07em;
    color:var(--muted);
  }
  .total-amount{
    font-family:var(--font-mono);
    font-size:30px;
    font-weight:800;
  }

  .section-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--muted);
    margin:0 0 10px;
  }

  .cash-row{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:12px;
  }
  .cash-input{
    flex:1;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:9px;
    color:var(--text);
    font-family:var(--font-mono);
    font-size:22px;
    font-weight:700;
    padding:12px 14px;
    width:100%;
  }
  .quickgrid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
    margin-bottom:18px;
  }
  .quick-btn{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 4px;
    font-family:var(--font-mono);
    font-size:12.5px;
    font-weight:700;
  }
  .quick-btn:active{border-color:var(--gold);}

  .result-box{
    border-radius:12px;
    padding:18px;
    text-align:center;
    margin-bottom:20px;
    position:relative;
    overflow:hidden;
  }
  .result-box.state-bad{background:var(--bad-soft);border:1px solid var(--bad);}
  .result-box.state-good{background:var(--good-soft);border:1px solid var(--good);}
  .result-box .bomb.big{
    position:absolute;
    opacity:.10;
    top:-25px;right:-20px;
  }
  .result-box .bomb.big::before,
  .result-box .bomb.big .bomb-fuse,
  .result-box .bomb.big .bomb-spark{background:currentColor;}
  .result-box.state-good{color:var(--good);}
  .result-box.state-bad{color:var(--bad);}
  .result-label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.06em;
    opacity:.85;
    margin:0 0 6px;
  }
  .result-amount{
    font-family:var(--font-mono);
    font-size:34px;
    font-weight:800;
    color:var(--text);
    margin:0 0 4px;
  }
  .result-box.state-bad .result-amount{color:var(--bad);}
  .result-box.state-good .result-amount{color:var(--good);}
  .breakdown{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:6px;
  }
  .chip{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    font-family:var(--font-mono);
    font-size:12px;
    font-weight:700;
    padding:5px 10px;
    border-radius:20px;
  }

  .overlay-footer{
    padding:14px 16px 20px;
    border-top:1px solid var(--line);
    display:flex;
    gap:10px;
    max-width:760px;
    width:100%;
    margin:0 auto;
  }
  .overlay-footer .btn{flex:1;}

  [hidden]{display:none !important;}
</style>
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="topbar-row">
      <div>
        <p class="eyebrow">Fiestas Patronales · El Salvador 2026</p>
        <h1 class="title"><span class="bomb"><span class="bomb-fuse"></span><span class="bomb-spark"></span></span>Caja</h1>
      </div>
    </div>
  </header>

  <main class="catalog" id="catalog"><!-- filled by JS --></main>

  <div class="orderbar">
    <div class="orderbar-info">
      <div class="orderbar-count" id="orderCount">0 artículos</div>
      <div class="orderbar-total" id="orderTotal">0,00 €</div>
    </div>
    <button class="btn btn-ghost" id="clearOrder">Vaciar</button>
    <button class="btn btn-accent" id="openCheckout" disabled>Cobrar →</button>
  </div>

  <div class="overlay" id="overlay" hidden>
    <div class="overlay-header">
      <button class="overlay-back" id="backFromCheckout" aria-label="Volver al pedido">←</button>
      <h2>Cobro</h2>
    </div>
    <div class="overlay-body">
      <p class="section-label">Pedido</p>
      <div class="cart-list" id="cartList"><!-- filled by JS --></div>

      <div class="total-block">
        <span class="total-label">Total a cobrar</span>
        <span class="total-amount" id="checkoutTotal">0,00 €</span>
      </div>

      <p class="section-label">Dinero entregado</p>
      <div class="cash-row">
        <input class="cash-input" id="cashInput" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0,00">
        <button class="btn btn-ghost" id="cashClear">Limpiar</button>
        <button class="btn btn-ghost" id="cashExact">Exacto</button>
      </div>
      <div class="quickgrid" id="quickGrid"><!-- filled by JS --></div>

      <div class="result-box" id="resultBox">
        <span class="bomb big"><span class="bomb-fuse"></span><span class="bomb-spark"></span></span>
        <p class="result-label" id="resultLabel">Cambio</p>
        <p class="result-amount" id="resultAmount">0,00 €</p>
        <div class="breakdown" id="breakdown"></div>
      </div>
    </div>
    <div class="overlay-footer">
      <button class="btn btn-ghost" id="cancelCheckout">Volver</button>
      <button class="btn btn-good" id="finishSale" disabled>Cobrado ✓</button>
    </div>
  </div>

</div>

<script>
(function(){

  // ---------- data ----------
  var CATEGORIES = [
    { name:'Cerveza y Kalimotxo', items:[
      { id:'cerveza',   name:'Cerveza / Caña', price:150 },
      { id:'1906',      name:'1906',           price:200 },
      { id:'canon',     name:'Cañón',          price:250 },
      { id:'kalimotxo', name:'Kalimotxo',      price:350 }
    ]},
    { name:'Sin alcohol', items:[
      { id:'refresco', name:'Refresco', price:200 },
      { id:'agua',     name:'Agua',     price:100 },
      { id:'mosto',    name:'Mosto',    price:150 }
    ]},
    { name:'Combinados', items:[
      { id:'cubata',  name:'Cubata',  price:500 },
      { id:'chupito', name:'Chupito', price:200 }
    ]},
    { name:'Vinos', items:[
      { id:'vermut', name:'Vermut', price:200 },
      { id:'vino',   name:'Vino',   price:150 }
    ]},
    { name:'Extras', items:[
      { id:'redbull', name:'Red Bull', price:100, extra:true }
    ]}
  ];

  var PRODUCTS = {};
  CATEGORIES.forEach(function(cat){
    cat.items.forEach(function(p){ PRODUCTS[p.id] = p; });
  });

  var QUICK_AMOUNTS = [5000,2000,1000,500,200,100,50,20,10,5]; // cents
  var DENOMS = [5000,2000,1000,500,200,100,50,20,10,5,2,1];

  // ---------- state ----------
  var state = {
    cart: {},      // id -> qty
    recibido: 0    // cents
  };

  // ---------- helpers ----------
  function formatEUR(cents){
    var sign = cents < 0 ? '-' : '';
    var abs = Math.abs(Math.round(cents));
    var euros = Math.floor(abs/100);
    var c = abs % 100;
    return sign + euros + ',' + (c < 10 ? '0'+c : c) + ' €';
  }

  function denomLabel(d){
    return d >= 100 ? (d/100) + ' €' : d + ' c';
  }

  function cartTotalCents(){
    var total = 0;
    Object.keys(state.cart).forEach(function(id){
      total += PRODUCTS[id].price * state.cart[id];
    });
    return total;
  }

  function cartCount(){
    var n = 0;
    Object.keys(state.cart).forEach(function(id){ n += state.cart[id]; });
    return n;
  }

  function breakdown(cents){
    var remaining = Math.round(cents);
    var out = [];
    DENOMS.forEach(function(d){
      var count = Math.floor(remaining / d);
      if(count > 0){
        out.push({ d:d, count:count });
        remaining -= d * count;
      }
    });
    return out;
  }

  // ---------- build catalog ----------
  var catalogEl = document.getElementById('catalog');

  CATEGORIES.forEach(function(cat){
    var section = document.createElement('section');
    section.className = 'cat-section';

    var header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = '<span class="bomb"><span class="bomb-fuse"></span><span class="bomb-spark"></span></span><h2>'+cat.name+'</h2><span class="rule"></span>';
    section.appendChild(header);

    var grid = document.createElement('div');
    grid.className = 'grid';

    cat.items.forEach(function(p){
      var btn = document.createElement('button');
      btn.className = 'product';
      btn.dataset.id = p.id;
      btn.innerHTML =
        '<span class="product-qty" data-qty-badge="'+p.id+'" hidden>0</span>' +
        '<span class="product-name">'+p.name+(p.extra ? '<span class="product-extra-tag"><br>extra</span>' : '')+'</span>' +
        '<span class="product-price">'+formatEUR(p.price)+(p.extra ? ' +' : '')+'</span>';
      btn.addEventListener('click', function(){ addToCart(p.id); });
      grid.appendChild(btn);
    });

    section.appendChild(grid);
    catalogEl.appendChild(section);
  });

  // ---------- DOM refs ----------
  var orderCountEl = document.getElementById('orderCount');
  var orderTotalEl = document.getElementById('orderTotal');
  var openCheckoutBtn = document.getElementById('openCheckout');
  var clearOrderBtn = document.getElementById('clearOrder');
  var overlay = document.getElementById('overlay');
  var cartListEl = document.getElementById('cartList');
  var checkoutTotalEl = document.getElementById('checkoutTotal');
  var cashInput = document.getElementById('cashInput');
  var quickGridEl = document.getElementById('quickGrid');
  var resultBox = document.getElementById('resultBox');
  var resultLabel = document.getElementById('resultLabel');
  var resultAmount = document.getElementById('resultAmount');
  var breakdownEl = document.getElementById('breakdown');
  var finishSaleBtn = document.getElementById('finishSale');

  // build quick-add buttons once
  QUICK_AMOUNTS.forEach(function(amt){
    var b = document.createElement('button');
    b.className = 'quick-btn';
    b.textContent = '+' + denomLabel(amt);
    b.addEventListener('click', function(){
      state.recibido += amt;
      syncCashInput();
      renderCheckout();
    });
    quickGridEl.appendChild(b);
  });

  // ---------- cart actions ----------
  function addToCart(id){
    state.cart[id] = (state.cart[id] || 0) + 1;
    renderAll();
    bumpBadge(id);
  }
  function decFromCart(id){
    if(!state.cart[id]) return;
    state.cart[id]--;
    if(state.cart[id] <= 0) delete state.cart[id];
    renderAll();
  }
  function removeFromCart(id){
    delete state.cart[id];
    renderAll();
  }
  function clearCart(){
    state.cart = {};
    state.recibido = 0;
    syncCashInput();
    renderAll();
  }

  function bumpBadge(id){
    var el = document.querySelector('[data-qty-badge="'+id+'"]');
    if(!el) return;
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  // ---------- render ----------
  function renderAll(){
    renderBadges();
    renderOrderBar();
    if(!overlay.hasAttribute('hidden')) renderCheckout();
  }

  function renderBadges(){
    Object.keys(PRODUCTS).forEach(function(id){
      var el = document.querySelector('[data-qty-badge="'+id+'"]');
      var btn = document.querySelector('.product[data-id="'+id+'"]');
      var qty = state.cart[id] || 0;
      el.textContent = qty;
      el.hidden = qty === 0;
      btn.classList.toggle('has-qty', qty > 0);
    });
  }

  function renderOrderBar(){
    var total = cartTotalCents();
    var count = cartCount();
    orderCountEl.textContent = count + (count === 1 ? ' artículo' : ' artículos');
    orderTotalEl.textContent = formatEUR(total);
    var empty = count === 0;
    openCheckoutBtn.disabled = empty;
    clearOrderBtn.disabled = empty;
  }

  function renderCheckout(){
    var total = cartTotalCents();
    checkoutTotalEl.textContent = formatEUR(total);

    // cart list
    var ids = Object.keys(state.cart);
    if(ids.length === 0){
      cartListEl.innerHTML = '<p class="empty-note">No hay artículos en el pedido.</p>';
    } else {
      cartListEl.innerHTML = '';
      ids.forEach(function(id){
        var p = PRODUCTS[id];
        var qty = state.cart[id];
        var row = document.createElement('div');
        row.className = 'cart-row';
        row.innerHTML =
          '<span class="cart-row-name">'+p.name+'</span>' +
          '<span class="cart-row-controls">' +
            '<button class="qty-btn" data-act="dec" data-id="'+id+'" aria-label="Quitar uno">–</button>' +
            '<span class="qty-val">'+qty+'</span>' +
            '<button class="qty-btn" data-act="inc" data-id="'+id+'" aria-label="Añadir uno">+</button>' +
          '</span>' +
          '<span class="cart-row-sub">'+formatEUR(p.price*qty)+'</span>';
        cartListEl.appendChild(row);
      });
      cartListEl.querySelectorAll('[data-act="inc"]').forEach(function(b){
        b.addEventListener('click', function(){ addToCart(b.dataset.id); });
      });
      cartListEl.querySelectorAll('[data-act="dec"]').forEach(function(b){
        b.addEventListener('click', function(){ decFromCart(b.dataset.id); });
      });
    }

    // result
    var change = state.recibido - total;
    if(total === 0){
      resultBox.className = 'result-box';
      resultLabel.textContent = 'Cambio';
      resultAmount.textContent = '—';
      breakdownEl.innerHTML = '';
      finishSaleBtn.disabled = true;
    } else if(change < 0){
      resultBox.className = 'result-box state-bad';
      resultLabel.textContent = 'Falta por cobrar';
      resultAmount.textContent = formatEUR(-change);
      breakdownEl.innerHTML = '';
      finishSaleBtn.disabled = true;
    } else {
      resultBox.className = 'result-box state-good';
      resultLabel.textContent = 'Cambio a devolver';
      resultAmount.textContent = formatEUR(change);
      var parts = breakdown(change);
      if(parts.length === 0){
        breakdownEl.innerHTML = '<span class="chip">Justo, sin cambio</span>';
      } else {
        breakdownEl.innerHTML = parts.map(function(part){
          return '<span class="chip">'+part.count+' × '+denomLabel(part.d)+'</span>';
        }).join('');
      }
      finishSaleBtn.disabled = false;
    }
  }

  function syncCashInput(){
    cashInput.value = state.recibido === 0 ? '' : (state.recibido/100).toFixed(2).replace('.', ',');
  }

  // ---------- events ----------
  clearOrderBtn.addEventListener('click', clearCart);

  openCheckoutBtn.addEventListener('click', function(){
    overlay.hidden = false;
    requestAnimationFrame(function(){ overlay.classList.add('open'); });
    renderCheckout();
  });

  function closeOverlay(){
    overlay.classList.remove('open');
    setTimeout(function(){ overlay.hidden = true; }, 220);
  }
  document.getElementById('backFromCheckout').addEventListener('click', closeOverlay);
  document.getElementById('cancelCheckout').addEventListener('click', closeOverlay);

  cashInput.addEventListener('input', function(){
    var raw = cashInput.value.replace(',', '.');
    var val = parseFloat(raw);
    state.recibido = isNaN(val) ? 0 : Math.round(val * 100);
    renderCheckout();
  });

  document.getElementById('cashClear').addEventListener('click', function(){
    state.recibido = 0;
    syncCashInput();
    renderCheckout();
  });

  document.getElementById('cashExact').addEventListener('click', function(){
    state.recibido = cartTotalCents();
    syncCashInput();
    renderCheckout();
  });

  finishSaleBtn.addEventListener('click', function(){
    clearCart();
    closeOverlay();
  });

  // ---------- init ----------
  renderAll();

})();
</script>
</body>
</html>
